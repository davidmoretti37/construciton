name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      eval_suite:
        description: 'Eval suite to run (smoke or full)'
        required: false
        default: 'full'
        type: choice
        options:
          - smoke
          - full

jobs:
  # ============================================================
  # BACKEND TESTS — API smoke tests, tool integrity, unit tests
  # ============================================================
  backend-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          OPENROUTER_API_KEY: test-key

  # ============================================================
  # FRONTEND TESTS — Component tests, hook tests, utils
  # ============================================================
  frontend-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test
        working-directory: ./frontend

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: ./frontend

  # ============================================================
  # LINT — Type checking
  # ============================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./frontend

  # ============================================================
  # SAFETY CHECKS — Tool integrity, secrets, production guards
  # ============================================================
  safety-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Verify tool definition integrity
        run: |
          node -e "
            const { toolDefinitions } = require('./src/services/tools/definitions');
            const { TOOL_HANDLERS } = require('./src/services/tools/handlers');
            const defined = toolDefinitions.map(t => t.function.name);
            const missing = defined.filter(n => !TOOL_HANDLERS[n]);
            if (missing.length > 0) {
              console.error('Missing handlers:', missing);
              process.exit(1);
            }
            console.log('All', defined.length, 'tools have matching handlers');
          "
        working-directory: ./backend
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key

      - name: Check for hardcoded secrets
        run: |
          FOUND=0
          for pattern in "sk-[a-zA-Z0-9]\{20,\}" "ghp_[a-zA-Z0-9]\{20,\}" "sk_live_[a-zA-Z0-9]"; do
            MATCHES=$(grep -rn "$pattern" --include="*.js" --include="*.ts" \
              --exclude-dir=node_modules --exclude-dir=__tests__ --exclude-dir=.git \
              . 2>/dev/null | head -5)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Possible hardcoded secret pattern found: $pattern"
              echo "$MATCHES"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ "$FOUND" -gt 0 ]; then
            echo "::error::Hardcoded secrets detected — review the warnings above"
            exit 1
          fi
          echo "No hardcoded secrets found"

      - name: Verify server loads without errors
        run: |
          node -e "
            try {
              require('./src/server');
              console.log('Server module loads successfully');
              process.exit(0);
            } catch(e) {
              console.error('Server failed to load:', e.message);
              process.exit(1);
            }
          "
        working-directory: ./backend
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          OPENROUTER_API_KEY: test-key

  # ============================================================
  # AGENT EVALS — Behavior tests against the chat agent.
  # PR: smoke subset (10 cases), only when agent-touching paths change.
  # main: full suite (30 cases).
  # workflow_dispatch: caller picks suite.
  # Persists every run + per-case result to Supabase eval_runs / eval_results.
  # Skipped when secrets aren't configured (forks, draft PRs).
  # ============================================================
  agent-evals:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && !github.event.pull_request.draft)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: paths
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD || true)
          fi
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^backend/src/services/(agentService|tools/|memory/|promptSanitizer|userSafeError)'; then
            echo "agent_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "agent_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide suite + skip
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "suite=${{ inputs.eval_suite }}" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "suite=full" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.paths.outputs.agent_changed }}" = "true" ]; then
            echo "suite=smoke" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "suite=skip" >> "$GITHUB_OUTPUT"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice
        if: steps.decide.outputs.should_run != 'true'
        run: echo "No agent-touching files changed — evals skipped."

      - name: Setup Node.js
        if: steps.decide.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        if: steps.decide.outputs.should_run == 'true'
        run: npm ci
        working-directory: ./backend

      - name: Run evals
        if: steps.decide.outputs.should_run == 'true'
        run: node evals/scripts/runEvals.js --suite ${{ steps.decide.outputs.suite }}
        working-directory: ./backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EVAL_TEST_USER_ID: ${{ secrets.EVAL_TEST_USER_ID }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVAL_PASS_RATE_FLOOR: '0.7'

  # ============================================================
  # BUILD — Requires all checks to pass
  # ============================================================
  build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, lint, safety-checks]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Export app (web)
        run: npx expo export --platform web
        working-directory: ./frontend
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}
