name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============================================================
  # BACKEND TESTS — API smoke tests, tool integrity, unit tests
  # ============================================================
  backend-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          OPENROUTER_API_KEY: test-key

  # ============================================================
  # FRONTEND TESTS — Component tests, hook tests, utils
  # ============================================================
  frontend-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test
        working-directory: ./frontend

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: ./frontend

  # ============================================================
  # LINT — Type checking
  # ============================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./frontend

  # ============================================================
  # SAFETY CHECKS — Tool integrity, secrets, production guards
  # ============================================================
  safety-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Verify tool definition integrity
        run: |
          node -e "
            const { toolDefinitions } = require('./src/services/tools/definitions');
            const { TOOL_HANDLERS } = require('./src/services/tools/handlers');
            const defined = toolDefinitions.map(t => t.function.name);
            const missing = defined.filter(n => !TOOL_HANDLERS[n]);
            if (missing.length > 0) {
              console.error('Missing handlers:', missing);
              process.exit(1);
            }
            console.log('All', defined.length, 'tools have matching handlers');
          "
        working-directory: ./backend
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key

      - name: Check for hardcoded secrets
        run: |
          FOUND=0
          for pattern in "sk-[a-zA-Z0-9]\{20,\}" "ghp_[a-zA-Z0-9]\{20,\}" "sk_live_[a-zA-Z0-9]"; do
            MATCHES=$(grep -rn "$pattern" --include="*.js" --include="*.ts" \
              --exclude-dir=node_modules --exclude-dir=__tests__ --exclude-dir=.git \
              . 2>/dev/null | head -5)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Possible hardcoded secret pattern found: $pattern"
              echo "$MATCHES"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ "$FOUND" -gt 0 ]; then
            echo "::error::Hardcoded secrets detected — review the warnings above"
            exit 1
          fi
          echo "No hardcoded secrets found"

      - name: Verify server loads without errors
        run: |
          node -e "
            try {
              require('./src/server');
              console.log('Server module loads successfully');
              process.exit(0);
            } catch(e) {
              console.error('Server failed to load:', e.message);
              process.exit(1);
            }
          "
        working-directory: ./backend
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          OPENROUTER_API_KEY: test-key

  # ============================================================
  # BUILD — Requires all checks to pass
  # ============================================================
  build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, lint, safety-checks]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./frontend

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Export app (web)
        run: npx expo export --platform web
        working-directory: ./frontend
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}
